<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交易分析系統 v1.2</title>
<style>
  :root {
    --bg:       #0d1117;
    --bg2:      #161b22;
    --bg3:      #21262d;
    --bg4:      #30363d;
    --border:   #30363d;
    --border2:  #484f58;
    --text:     #e6edf3;
    --text2:    #8b949e;
    --text3:    #6e7681;
    --accent:   #58a6ff;
    --green:    #3fb950;
    --green2:   #23863a;
    --red:      #f85149;
    --red2:     #8b1c1c;
    --yellow:   #d29922;
    --yellow2:  #f0883e;
    --purple:   #bc8cff;
    --teal:     #39d353;
    --gold:     #e3b341;
    --mode-a:   #1f6feb;
    --mode-b:   #388bfd;
    --r: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: ‘SF Mono’, ‘Cascadia Code’, ‘Consolas’, monospace;
background: var(–bg);
color: var(–text);
font-size: 13px;
min-height: 100vh;
}

/* ── Header ── */
.header {
background: var(–bg2);
border-bottom: 1px solid var(–border);
padding: 10px 16px;
display: flex;
align-items: center;
gap: 12px;
position: sticky;
top: 0;
z-index: 100;
}
.header-title {
font-size: 14px;
font-weight: 600;
color: var(–text);
letter-spacing: .5px;
}
.header-badge {
font-size: 10px;
padding: 2px 7px;
border-radius: 20px;
font-weight: 600;
letter-spacing: .3px;
}
.badge-version { background: var(–bg4); color: var(–text2); }
.badge-mode-a  { background: #1f3a5f; color: #79c0ff; }
.badge-mode-b  { background: #1a2d4a; color: #58a6ff; }
.badge-offline { background: #1a2d1a; color: var(–green); }

.mode-selector {
margin-left: auto;
display: flex;
gap: 4px;
}
.mode-btn {
padding: 4px 12px;
border-radius: var(–r);
border: 1px solid var(–border2);
background: var(–bg3);
color: var(–text2);
cursor: pointer;
font-size: 12px;
font-family: inherit;
transition: all .15s;
}
.mode-btn:hover { border-color: var(–accent); color: var(–text); }
.mode-btn.active-a { background: #1f3a5f; border-color: #388bfd; color: #79c0ff; font-weight: 600; }
.mode-btn.active-b { background: #1a2d4a; border-color: #58a6ff; color: #58a6ff; font-weight: 600; }
.mode-btn.active-none { background: var(–bg4); border-color: var(–border2); color: var(–text2); }

/* ── Layout ── */
.layout {
display: grid;
grid-template-columns: 380px 1fr;
gap: 0;
height: calc(100vh - 45px);
}

/* ── Left panel: input ── */
.input-panel {
background: var(–bg2);
border-right: 1px solid var(–border);
overflow-y: auto;
padding: 0;
}
.input-panel::-webkit-scrollbar { width: 4px; }
.input-panel::-webkit-scrollbar-track { background: transparent; }
.input-panel::-webkit-scrollbar-thumb { background: var(–border2); border-radius: 2px; }

/* ── Right panel: output ── */
.output-panel {
overflow-y: auto;
padding: 0;
background: var(–bg);
}
.output-panel::-webkit-scrollbar { width: 4px; }
.output-panel::-webkit-scrollbar-track { background: transparent; }
.output-panel::-webkit-scrollbar-thumb { background: var(–border2); border-radius: 2px; }

/* ── Section headers ── */
.section-hdr {
padding: 10px 14px 8px;
background: var(–bg3);
border-bottom: 1px solid var(–border);
font-size: 11px;
font-weight: 600;
color: var(–text2);
letter-spacing: .8px;
text-transform: uppercase;
display: flex;
align-items: center;
gap: 6px;
}
.section-hdr .dot {
width: 6px; height: 6px;
border-radius: 50%;
background: var(–accent);
flex-shrink: 0;
}
.section-hdr .dot-green  { background: var(–green); }
.section-hdr .dot-yellow { background: var(–yellow); }
.section-hdr .dot-red    { background: var(–red); }
.section-hdr .dot-purple { background: var(–purple); }
.section-hdr .opt-label {
margin-left: auto;
font-size: 9px;
color: var(–text3);
letter-spacing: .3px;
text-transform: none;
}

/* ── Input grid ── */
.input-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 1px;
background: var(–border);
border-bottom: 1px solid var(–border);
}
.input-grid.cols3 { grid-template-columns: 1fr 1fr 1fr; }
.input-grid.cols4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.input-grid.cols1 { grid-template-columns: 1fr; }

.input-cell {
background: var(–bg2);
padding: 8px 10px;
display: flex;
flex-direction: column;
gap: 3px;
}
.input-cell label {
font-size: 10px;
color: var(–text3);
letter-spacing: .3px;
}
.input-cell input, .input-cell select {
background: transparent;
border: none;
border-bottom: 1px solid var(–border2);
color: var(–text);
font-family: inherit;
font-size: 13px;
padding: 2px 0;
outline: none;
width: 100%;
transition: border-color .15s;
}
.input-cell input:focus, .input-cell select:focus {
border-bottom-color: var(–accent);
}
.input-cell input::placeholder { color: var(–text3); font-size: 11px; }
.input-cell select option { background: var(–bg3); }
.input-cell .unit {
font-size: 9px;
color: var(–text3);
margin-top: 1px;
}

/* ── Chip inputs ── */
.chip-row {
display: flex;
gap: 1px;
background: var(–border);
border-bottom: 1px solid var(–border);
}
.chip-cell {
flex: 1;
background: var(–bg2);
padding: 6px 8px;
}
.chip-cell label { font-size: 9px; color: var(–text3); display: block; margin-bottom: 2px; }
.chip-cell input {
width: 100%;
background: transparent;
border: none;
border-bottom: 1px solid var(–border2);
color: var(–text);
font-family: inherit;
font-size: 12px;
padding: 2px 0;
outline: none;
}
.chip-cell input:focus { border-bottom-color: var(–accent); }

/* ── Analyse button ── */
.analyse-wrap {
padding: 12px 14px;
border-bottom: 1px solid var(–border);
}
.btn-analyse {
width: 100%;
padding: 10px;
background: var(–accent);
color: #0d1117;
border: none;
border-radius: var(–r);
font-family: inherit;
font-size: 13px;
font-weight: 700;
cursor: pointer;
letter-spacing: .5px;
transition: all .15s;
}
.btn-analyse:hover { background: #79c0ff; transform: translateY(-1px); }
.btn-analyse:active { transform: translateY(0); }

/* ── Right panel sections ── */
.out-section { border-bottom: 1px solid var(–border); }

/* ── Tags grid ── */
.tags-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 8px;
padding: 12px 14px;
}
.tag-card {
background: var(–bg2);
border: 1px solid var(–border);
border-radius: var(–r);
padding: 8px 10px;
}
.tag-card .tag-label {
font-size: 9px;
color: var(–text3);
text-transform: uppercase;
letter-spacing: .4px;
margin-bottom: 4px;
}
.tag-card .tag-value {
font-size: 12px;
font-weight: 600;
color: var(–text2);
}
.tag-card.active .tag-value { color: var(–text); }
.tag-card.tag-bull   { border-color: #23863a; background: #0d1f0d; }
.tag-card.tag-bull .tag-value { color: var(–green); }
.tag-card.tag-bear   { border-color: #8b1c1c; background: #1f0d0d; }
.tag-card.tag-bear .tag-value { color: var(–red); }
.tag-card.tag-warn   { border-color: #5a3e00; background: #1a1000; }
.tag-card.tag-warn .tag-value { color: var(–yellow); }
.tag-card.tag-neutral{ border-color: var(–border); }
.tag-card.tag-neutral .tag-value { color: var(–text2); }

/* ── Scores ── */
.scores-row {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 8px;
padding: 12px 14px;
}
.score-card {
background: var(–bg2);
border: 1px solid var(–border);
border-radius: var(–r);
padding: 10px;
text-align: center;
position: relative;
overflow: hidden;
}
.score-card::after {
content: ‘’;
position: absolute;
bottom: 0; left: 0; right: 0;
height: 3px;
background: var(–border);
}
.score-card.filled::after { background: var(–score-color, var(–accent)); }
.score-label { font-size: 9px; color: var(–text3); text-transform: uppercase; letter-spacing: .4px; }
.score-value { font-size: 24px; font-weight: 700; margin: 4px 0; color: var(–text2); }
.score-card.filled .score-value { color: var(–score-color, var(–accent)); }
.score-sub { font-size: 9px; color: var(–text3); }

/* ── Decision box ── */
.decision-wrap {
padding: 12px 14px;
}
.decision-box {
background: var(–bg2);
border: 2px solid var(–border);
border-radius: var(–r);
padding: 16px;
text-align: center;
transition: all .3s;
}
.decision-box.decided { border-width: 2px; }
.decision-action {
font-size: 28px;
font-weight: 800;
letter-spacing: 1px;
margin-bottom: 6px;
color: var(–text3);
}
.decision-meta {
font-size: 11px;
color: var(–text3);
line-height: 1.6;
}
.decision-meta span { color: var(–text2); }
.override-banner {
margin-top: 8px;
padding: 6px 10px;
background: #2d1a00;
border: 1px solid var(–yellow);
border-radius: 4px;
font-size: 11px;
color: var(–yellow);
text-align: left;
display: none;
}
.override-banner.show { display: block; }

/* Action colours */
.action-不進場  { color: var(–text3) !important; }
.action-觀察    { color: var(–yellow) !important; }
.action-試單    { color: var(–green) !important; }
.action-加碼    { color: #56d364 !important; }
.action-續抱    { color: var(–accent) !important; }
.action-減碼    { color: var(–yellow2) !important; }
.action-出場    { color: var(–red) !important; }

.box-不進場  { border-color: var(–border2) !important; }
.box-觀察    { border-color: var(–yellow) !important; background: #1a1000 !important; }
.box-試單    { border-color: var(–green2) !important; background: #0d1f0d !important; }
.box-加碼    { border-color: var(–green) !important; background: #0d2010 !important; }
.box-續抱    { border-color: #1f3a5f !important; background: #0d1520 !important; }
.box-減碼    { border-color: var(–yellow2) !important; background: #1a1200 !important; }
.box-出場    { border-color: var(–red2) !important; background: #1f0d0d !important; }

/* ── Risk gauge row ── */
.risk-row {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 6px;
padding: 10px 14px;
}
.risk-item {
background: var(–bg2);
border: 1px solid var(–border);
border-radius: 4px;
padding: 6px 8px;
display: flex;
align-items: center;
gap: 6px;
font-size: 11px;
}
.risk-dot { width: 8px; height: 8px; border-radius: 50%; background: var(–border2); flex-shrink: 0; }
.risk-dot.on-r  { background: var(–red); box-shadow: 0 0 6px var(–red); }
.risk-dot.on-y  { background: var(–yellow); box-shadow: 0 0 6px var(–yellow); }
.risk-dot.on-g  { background: var(–green); }
.risk-label { color: var(–text3); }
.risk-item.triggered { border-color: var(–red2); background: #1f0d0d; }
.risk-item.triggered .risk-label { color: var(–red); }

/* ── Stop loss / position suggestion ── */
.suggestion-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 8px;
padding: 10px 14px;
}
.sugg-card {
background: var(–bg2);
border: 1px solid var(–border);
border-radius: var(–r);
padding: 8px 10px;
}
.sugg-label { font-size: 9px; color: var(–text3); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
.sugg-value { font-size: 14px; font-weight: 600; color: var(–text); }
.sugg-sub   { font-size: 10px; color: var(–text3); margin-top: 2px; }

/* ── Score bar ── */
.composite-bar-wrap {
padding: 10px 14px;
}
.composite-bar-label {
display: flex;
justify-content: space-between;
margin-bottom: 5px;
font-size: 11px;
color: var(–text2);
}
.composite-bar-track {
height: 8px;
background: var(–bg4);
border-radius: 4px;
overflow: hidden;
position: relative;
}
.composite-bar-fill {
height: 100%;
border-radius: 4px;
transition: width .4s ease, background .4s ease;
background: var(–border2);
}
/* threshold markers */
.composite-bar-track::before {
content: ‘’;
position: absolute;
left: 60%;
top: 0; bottom: 0;
width: 1px;
background: var(–text3);
opacity: .4;
}
.composite-bar-track::after {
content: ‘’;
position: absolute;
left: 80%;
top: 0; bottom: 0;
width: 1px;
background: var(–text3);
opacity: .4;
}
.bar-markers {
display: flex;
justify-content: space-between;
margin-top: 3px;
font-size: 9px;
color: var(–text3);
padding: 0 0;
position: relative;
}
.bar-m60 { position: absolute; left: 60%; transform: translateX(-50%); }
.bar-m80 { position: absolute; left: 80%; transform: translateX(-50%); }

/* ── Score breakdown ── */
.breakdown-wrap { padding: 8px 14px 12px; }
.breakdown-item {
display: flex;
align-items: center;
gap: 8px;
margin-bottom: 5px;
}
.bd-label { font-size: 10px; color: var(–text3); width: 52px; flex-shrink: 0; }
.bd-bar-track {
flex: 1;
height: 4px;
background: var(–bg4);
border-radius: 2px;
overflow: hidden;
}
.bd-bar-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }
.bd-val { font-size: 10px; color: var(–text2); width: 28px; text-align: right; flex-shrink: 0; }

/* ── L4 reason ── */
.reason-wrap {
padding: 8px 14px 12px;
}
.reason-code {
display: inline-block;
font-size: 10px;
padding: 2px 8px;
border-radius: 3px;
background: var(–bg4);
color: var(–text2);
border: 1px solid var(–border2);
font-family: inherit;
letter-spacing: .3px;
}
.reason-text { font-size: 11px; color: var(–text3); margin-top: 4px; line-height: 1.5; }

/* ── Empty state ── */
.empty-state {
padding: 60px 20px;
text-align: center;
color: var(–text3);
}
.empty-icon { font-size: 36px; margin-bottom: 12px; opacity: .4; }
.empty-text { font-size: 13px; }

/* ── Placeholder dots ── */
.placeholder { color: var(–text3); font-size: 18px; }

/* ── Scrollable form sections ── */
.form-note {
padding: 4px 14px 6px;
font-size: 10px;
color: var(–text3);
font-style: italic;
}

/* ── Template selector ── */
.template-row {
display: flex;
gap: 4px;
padding: 8px 14px;
border-bottom: 1px solid var(–border);
}
.tmpl-btn {
flex: 1;
padding: 5px;
border-radius: 4px;
border: 1px solid var(–border2);
background: var(–bg3);
color: var(–text2);
cursor: pointer;
font-size: 11px;
font-family: inherit;
text-align: center;
transition: all .15s;
}
.tmpl-btn:hover { border-color: var(–accent); color: var(–text); }
.tmpl-btn.active {
background: #1f3a5f;
border-color: var(–accent);
color: var(–accent);
font-weight: 600;
}

@media (max-width: 768px) {
.layout { grid-template-columns: 1fr; height: auto; }
.input-panel { height: auto; overflow: visible; }
.output-panel { height: auto; }
.tags-grid { grid-template-columns: repeat(2, 1fr); }
.scores-row { grid-template-columns: repeat(2, 1fr); }
.risk-row { grid-template-columns: repeat(2, 1fr); }
}
</style>

</head>
<body>

<!-- Header -->

<div class="header">
  <span class="header-title">📈 交易分析系統</span>
  <span class="header-badge badge-version">v1.2</span>
  <span class="header-badge badge-offline">OFFLINE</span>
  <div id="mode-display" class="header-badge badge-mode-a" style="display:none"></div>

  <div class="mode-selector">
    <button class="mode-btn active-none" id="mode-none" onclick="setMode('')">— 未定</button>
    <button class="mode-btn" id="mode-a"    onclick="setMode('A')">🎯 A模式</button>
    <button class="mode-btn" id="mode-b"    onclick="setMode('B')">🛡 B模式</button>
  </div>
</div>

<div class="layout">

  <!-- ══════════════════════════ LEFT: INPUT PANEL ══════════════════════════ -->

  <div class="input-panel">

```
<!-- Template -->
<div class="template-row">
  <button class="tmpl-btn" id="tmpl-A" onclick="setTemplate('A')">A 盤中短線</button>
  <button class="tmpl-btn active" id="tmpl-B" onclick="setTemplate('B')">B 波段日K</button>
  <button class="tmpl-btn" id="tmpl-C" onclick="setTemplate('C')">C 趨勢週K</button>
</div>

<!-- Basic info -->
<div class="section-hdr"><span class="dot"></span>基本資訊</div>
<div class="input-grid cols1">
  <div class="input-cell">
    <label>股票名稱 / 代號</label>
    <input type="text" id="symbol" placeholder="e.g. 台積電 / 2330">
  </div>
</div>
<div class="input-grid cols4">
  <div class="input-cell">
    <label>現價</label>
    <input type="number" id="price_current" placeholder="—" step="0.1">
  </div>
  <div class="input-cell">
    <label>近期高點</label>
    <input type="number" id="price_high_recent" placeholder="—" step="0.1">
  </div>
  <div class="input-cell">
    <label>近期低點</label>
    <input type="number" id="price_low_recent" placeholder="—" step="0.1">
  </div>
  <div class="input-cell">
    <label>持倉成本 <span style="font-size:9px;color:var(--text3)">(選填)</span></label>
    <input type="number" id="cost_basis" placeholder="—" step="0.1">
  </div>
</div>
<div class="input-grid cols3">
  <div class="input-cell">
    <label>當根收盤 (bar_close)</label>
    <input type="number" id="bar_close" placeholder="—" step="0.1">
  </div>
  <div class="input-cell">
    <label>昨日收盤</label>
    <input type="number" id="prev_close" placeholder="—" step="0.1">
  </div>
  <div class="input-cell">
    <label>今日開盤</label>
    <input type="number" id="today_open" placeholder="—" step="0.1">
  </div>
</div>

<!-- Timeframe -->
<div class="input-grid cols1">
  <div class="input-cell">
    <label>K線週期</label>
    <select id="timeframe">
      <option value="5m">5分K</option>
      <option value="15m">15分K</option>
      <option value="30m">30分K</option>
      <option value="60m">60分K</option>
      <option value="D" selected>日K</option>
      <option value="W">週K</option>
      <option value="M">月K</option>
    </select>
  </div>
</div>

<!-- MA -->
<div class="section-hdr"><span class="dot dot-green"></span>均線</div>
<div class="input-grid cols3">
  <div class="input-cell">
    <label>MA5</label>
    <input type="number" id="ma5" placeholder="—" step="0.1">
  </div>
  <div class="input-cell">
    <label>MA10</label>
    <input type="number" id="ma10" placeholder="—" step="0.1">
  </div>
  <div class="input-cell">
    <label>MA20</label>
    <input type="number" id="ma20" placeholder="—" step="0.1">
  </div>
</div>

<!-- RSI -->
<div class="section-hdr"><span class="dot dot-yellow"></span>RSI 指標</div>
<div class="input-grid cols3">
  <div class="input-cell">
    <label>RSI(5) 短期</label>
    <input type="number" id="rsi_5" placeholder="—" step="0.1" min="0" max="100">
  </div>
  <div class="input-cell">
    <label>RSI(10) 中期</label>
    <input type="number" id="rsi_10" placeholder="—" step="0.1" min="0" max="100">
  </div>
  <div class="input-cell">
    <label>前期 RSI(5)</label>
    <input type="number" id="rsi_5_prev" placeholder="—" step="0.1" min="0" max="100">
  </div>
</div>

<!-- MACD -->
<div class="section-hdr"><span class="dot dot-purple"></span>MACD 指標</div>
<div class="input-grid cols4">
  <div class="input-cell">
    <label>DIF 快線</label>
    <input type="number" id="dif" placeholder="—" step="0.01">
  </div>
  <div class="input-cell">
    <label>Signal 慢線</label>
    <input type="number" id="signal_macd" placeholder="—" step="0.01">
  </div>
  <div class="input-cell">
    <label>OSC 現值</label>
    <input type="number" id="osc" placeholder="—" step="0.001">
  </div>
  <div class="input-cell">
    <label>OSC 前值</label>
    <input type="number" id="osc_prev" placeholder="—" step="0.001">
  </div>
</div>

<!-- Wave structure -->
<div class="section-hdr"><span class="dot dot-red"></span>波段結構 <span class="opt-label">★ 核心必填</span></div>
<div class="input-grid cols3">
  <div class="input-cell">
    <label>SH1 近期高點</label>
    <input type="number" id="sh1" placeholder="—" step="0.1">
  </div>

<script>
// ══════════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════════
let currentMode = '';
let currentTemplate = 'B';

const TEMPLATES = {

       rsi_ob:75, rsi_strong:60, rsi_weak:45, rsi_os:30,
       sl_offset:-3, trailing:-12 },
};

  });
  if (m==='A') document.getElementById('mode-a').className = 'mode-btn active-a';
  else if (m==='B') document.getElementById('mode-b').className = 'mode-btn active-b';
  else document.getElementById('mode-none').className = 'mode-btn active-none';

}

function setTemplate(t) {

  ['A','B','C'].forEach(x => {
    document.getElementById('tmpl-'+x).className = 'tmpl-btn' + (x===t?' active':'');
  });
  saveState();
}

// ══════════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════════
const V = id => {
  const el = document.getElementById(id);
  if (!el) return null;
  const v = parseFloat(el.value);
  return isNaN(v) ? null : v;
};
const VS = id => document.getElementById(id)?.value?.trim() || '';
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

// ══════════════════════════════════════════════════════════════════
//  LAYER 2: TAG GENERATION  (v1.2 §9 rules)
// ══════════════════════════════════════════════════════════════════
function genTags(d, P) {
  const tags = {};

  // ── tag_price_structure (Fix-3 7-step priority) ──
  const { sh1, sh2, sl1, sl2, bar_close, prev_close, rsi_5, rsi_5_prev } = d;
  if (sl1!==null && sl2!==null && sh1!==null && sh2!==null && bar_close!==null) {
    // P1: 下跌段
    if (sl1 < sl2 && sh1 < sh2) {
      tags.price_structure = '下跌段';
    }
    // P2: 結構破壞
    else if (bar_close < sl1) {
      tags.price_structure = '結構破壞';
    }
    // P3: 回測中 (in SL1 ±3% buffer, RSI still falling)
    else if (bar_close >= sl1 * 0.97 && bar_close <= sl1 * 1.03 && rsi_5!==null && rsi_5_prev!==null && rsi_5 < rsi_5_prev) {
      tags.price_structure = '回測中';
    }
    // P4: 回測完成 (in SL1 buffer, RSI bottomed, close >= prev_close)
    else if (bar_close >= sl1 * 0.97 && bar_close <= sl1 * 1.03 && rsi_5!==null && rsi_5_prev!==null && rsi_5 >= rsi_5_prev && prev_close!==null && bar_close >= prev_close) {
      tags.price_structure = '回測完成';
    }
    // P5: 主升段 (HH+HL, price above buffer)
    else if (sh1 > sh2 && sl1 > sl2 && bar_close > sl1 * 1.03) {
      tags.price_structure = '主升段';
    }
    // P6: 整理末段
    else if ((sh1 <= sh2 && sl1 >= sl2) || (Math.abs(sh1-sh2) < (sh2*0.02) && Math.abs(sl1-sl2) < (sl2*0.02))) {
      tags.price_structure = '整理末段';
    }
    else {
      tags.price_structure = '整理末段'; // fallback P7
    }
  } else {
    tags.price_structure = '整理末段'; // missing data fallback
  }

  // ── tag_ma_alignment ──
  const { ma5, ma10, ma20 } = d;
  if (ma5!==null && ma10!==null && ma20!==null) {
    if (ma5 > ma10 && ma10 > ma20) tags.ma_alignment = '多頭排列';
    else if (ma5 < ma10 && ma10 < ma20) tags.ma_alignment = '空頭排列';
    else tags.ma_alignment = '糾結';
  } else {
    tags.ma_alignment = '糾結';
  }

  // ── tag_momentum ──
  const { osc, osc_prev } = d;
  if (rsi_5!==null && rsi_5_prev!==null && osc!==null && osc_prev!==null) {
    if (rsi_5 < P.rsi_weak || osc < 0) tags.momentum = '翻空';
    else if (rsi_5 < rsi_5_prev && osc <= osc_prev) tags.momentum = '動能衰退';
    else if (rsi_5 >= rsi_5_prev && osc > 0 && osc > osc_prev) tags.momentum = '動能加速';
    else tags.momentum = '緩漲';
  } else if (rsi_5 !== null) {
    if (rsi_5 < P.rsi_weak) tags.momentum = '翻空';
    else tags.momentum = '緩漲';
  } else {
    tags.momentum = '動能衰退'; // conservative fallback
  }

  // ── tag_chip ──
  const { chip_d0, chip_d1, chip_d2 } = d;
  if (chip_d0!==null && chip_d1!==null && chip_d2!==null) {
    if (chip_d0>0 && chip_d1>0 && chip_d2>0) tags.chip = '籌碼偏多';
    else if (chip_d0>0 && chip_d1>0) tags.chip = '籌碼短多';
    else if (chip_d0<0 && chip_d1<0 && chip_d2<0) tags.chip = '籌碼偏空';
    else if (chip_d0<0 && chip_d1<0) tags.chip = '籌碼短空';
    else tags.chip = '中性';
  } else if (chip_d0!==null) {
    if (chip_d0>0) tags.chip = '籌碼短多';
    else if (chip_d0<0) tags.chip = '籌碼短空';
    else tags.chip = '中性';
  } else {
    tags.chip = '中性';
  }

  // ── tag_volume ──
  const { volume_now, volume_prev, daily_change_pct } = d;
  if (volume_now!==null && volume_prev!==null && volume_prev>0) {
    const ratio = volume_now / volume_prev;
    d.volume_ratio = ratio;
    if (ratio >= P.r3_vol) tags.volume = '爆量過熱';
    else if (ratio >= 1.5 && daily_change_pct!==null && daily_change_pct > 0) tags.volume = '放量突破';
    else if (ratio < 0.7) tags.volume = '縮量整理';
    else tags.volume = '正常量';
  } else {
    d.volume_ratio = null;
    tags.volume = '正常量';
  }

  // ── tag_rsi_zone ──
  if (rsi_5 !== null) {
    if (rsi_5 >= P.rsi_ob) tags.rsi_zone = '超買';
    else if (rsi_5 >= P.rsi_strong) tags.rsi_zone = '強勢區';
    else if (rsi_5 >= P.rsi_weak) tags.rsi_zone = '中性區';
    else if (rsi_5 > P.rsi_os) tags.rsi_zone = '弱勢區';
    else tags.rsi_zone = '超賣';
  } else {
    tags.rsi_zone = '中性區';
  }

  return tags;
}

// ══════════════════════════════════════════════════════════════════
//  LAYER 3: SIGNAL SCORING  (§15 v1.2 rules)
// ══════════════════════════════════════════════════════════════════
function computeScores(tags, P) {
  let t = 50, mo = 50, ch = 50, ri = 10;

  // score_trend: price_structure + ma_alignment
  const psAdj = { '主升段':40,'回測完成':25,'回測中':10,'整理末段':5,'結構破壞':-30,'下跌段':-40 };
  const maAdj = { '多頭排列':20,'糾結':0,'空頭排列':-20 };
  t += (psAdj[tags.price_structure] ?? 0);
  t += (maAdj[tags.ma_alignment] ?? 0);

  // score_momentum: momentum + rsi_zone + volume (momentum part)
  const moAdj = { '動能加速':40,'緩漲':15,'動能衰退':-20,'翻空':-40 };
  const rsiMoAdj = { '超買':-10,'強勢區':20,'中性區':0,'弱勢區':-15,'超賣':-20 };
  const volMoAdj = { '放量突破':20,'正常量':0,'縮量整理':0,'爆量過熱':-5 };
  mo += (moAdj[tags.momentum] ?? 0);
  mo += (rsiMoAdj[tags.rsi_zone] ?? 0);
  mo += (volMoAdj[tags.volume] ?? 0);

  // score_chip
  const chipAdj = { '籌碼偏多':40,'籌碼短多':20,'中性':0,'籌碼短空':-20,'籌碼偏空':-40 };
  ch += (chipAdj[tags.chip] ?? 0);

  // score_risk: rsi_zone + volume
  const rsiRiAdj = { '超買':25,'強勢區':0,'中性區':0,'弱勢區':10,'超賣':15 };
  const volRiAdj = { '爆量過熱':30,'放量突破':0,'正常量':0,'縮量整理':0 };
  ri += (rsiRiAdj[tags.rsi_zone] ?? 0);
  ri += (volRiAdj[tags.volume] ?? 0);

  // Ceiling overrides (§15 v1.1)
  if (tags.price_structure === '結構破壞') t = Math.min(t, 30);
  if (tags.price_structure === '下跌段')   t = Math.min(t, 5);
  if (tags.momentum === '翻空')            mo = Math.min(mo, 25);
  if (tags.volume === '爆量過熱' && tags.rsi_zone === '超買') ri = Math.max(ri, 60);

  // Clamp
  t  = clamp(t,  5, 95);
  mo = clamp(mo, 5, 95);
  ch = clamp(ch, 5, 95);
  ri = clamp(ri, 5, 95);

  // risk_contribution (Fix-1 c3)
  const rc = clamp(100 - ri, 10, 90);

  // Weighted composite
  const total = P.w_trend + P.w_momentum + P.w_chip + P.w_risk;
  const raw = (t * P.w_trend + mo * P.w_momentum + ch * P.w_chip + rc * P.w_risk) / total;
  const composite = Math.round(raw);

  return { score_trend: Math.round(t), score_momentum: Math.round(mo),
           score_chip: Math.round(ch), score_risk: Math.round(ri), score_composite: composite };
}

// ══════════════════════════════════════════════════════════════════
//  RISK GATING (Fix-1, in L4)
// ══════════════════════════════════════════════════════════════════
function riskGating(scores, hasPosition) {
  const { score_risk, score_composite } = scores;
  if (score_risk >= 70) {
    return hasPosition ? { action:'觀察', reason:'OBSERVE', gated:true, detail:'score_risk≥70，完全封鎖新倉' } :
                         { action:'不進場', reason:'NO_ENTRY_SCORE', gated:true, detail:'score_risk≥70，禁止進場' };
  }
  if (score_risk >= 50) {
    // Fix-1 封版：無倉→觀察（禁止試單）
    return hasPosition ? null : // has position: allow, but block add (handled later)
                         { action:'觀察', reason:'OBSERVE', gated:true, detail:'score_risk 50~69，無倉禁止試單→觀察' };
  }
  return null; // no gating
}

// ══════════════════════════════════════════════════════════════════
//  LAYER 4: TRADE RULE ENGINE
// ══════════════════════════════════════════════════════════════════
function tradeRule(tags, scores, d, P, mode) {
  const { score_composite: sc, score_risk: sr } = scores;
  const ps = tags.price_structure;
  const mo = tags.momentum;
  const pos = d.position_pct ?? 0;
  const hasPos = pos > 0;
  const maxSingle = P.max_single;
  const posState = pos === 0 ? '無倉' :
                   pos < maxSingle * 0.45 ? '試單中' :
                   pos < maxSingle * 0.85 ? '已加碼' : '接近上限';
  const is_planned = VS('is_planned') !== 'false';

  // R8: 非計畫內交易 — block entry
  if (!is_planned && !hasPos) {
    return { action:'不進場', reason:'NO_ENTRY_SCORE', l4_code:'NO_ENTRY_SCORE',
             detail:'R8：非計畫內交易，禁止下單（is_planned=false）', posState };
  }

  // Step1-2 (Fallback §4): structure collapse / downtrend
  if (ps === '結構破壞') {
    if (hasPos) return { action:'出場', reason:'EXIT_STRUCT', l4_code:'EXIT_STRUCT',
                         detail:'結構破壞，L5 執行 R4b/R4c', posState };
    return { action:'不進場', reason:'NO_ENTRY_SCORE', l4_code:'NO_ENTRY_SCORE',
             detail:'結構破壞，不建新倉', posState };
  }
  if (ps === '下跌段') {
    if (hasPos) return { action:'出場', reason:'EXIT_TREND', l4_code:'EXIT_TREND',
                         detail:'下跌段確認，L5 執行 R4d', posState };
    return { action:'不進場', reason:'NO_ENTRY_SCORE', l4_code:'NO_ENTRY_SCORE',
             detail:'下跌段，不做多', posState };
  }

  // Risk gating (Fix-1)
  const gated = riskGating(scores, hasPos);
  if (gated && !hasPos) return { ...gated, l4_code: gated.reason, posState };

  // score < entry_min
  if (sc < P.entry_min) {
    if (hasPos) {
      // check if we should reduce
      if (mo === '翻空' || mo === '動能衰退') {
        return { action:'減碼', reason:'REDUCE_WEAK', l4_code:'REDUCE_WEAK',
                 detail:'評分低且動能衰退，先行減碼', posState };
      }
      return { action:'續抱', reason:'HOLD', l4_code:'HOLD',
               detail:'評分未達門檻，維持現有持倉觀察', posState };
    }
    return { action:'不進場', reason:'NO_ENTRY_SCORE', l4_code:'NO_ENTRY_SCORE',
             detail:`composite=${sc} < 進場門檻${P.entry_min}`, posState };
  }

  // B mode: hard 80 threshold (Fix-2)
  if (mode === 'B' && sc < 80 && !hasPos) {
    return { action:'不進場', reason:'NO_ENTRY_MODE', l4_code:'NO_ENTRY_MODE',
             detail:`B模式進場硬性門檻80分，composite=${sc}`, posState };
  }

  // momentum bad
  if (mo === '翻空') {
    if (hasPos) return { action:'減碼', reason:'REDUCE_WRONG', l4_code:'REDUCE_WRONG',
                         detail:'動能翻空，H4 走錯減碼', posState };
    return { action:'不進場', reason:'NO_ENTRY_SCORE', l4_code:'NO_ENTRY_SCORE',
             detail:'動能翻空，不建多倉', posState };
  }

  // Position-based decisions
  if (posState === '接近上限') {
    return { action:'續抱', reason:'HOLD', l4_code:'HOLD',
             detail:'接近持倉上限，禁止加碼，續抱', posState };
  }

  if (!hasPos) {
    // Entry logic
    const canEntry = ps === '主升段' || ps === '回測完成' || ps === '整理末段';
    if (canEntry && sc >= P.entry_min) {
      const tpct = mode === 'B' ? Math.min(P.trial_pct, 15) : P.trial_pct;
      return { action:'試單', reason:'ENTRY_TRIAL', l4_code:'ENTRY_TRIAL',
               detail:`P1：${ps}，score=${sc}，建立試單 ${tpct}%`, posState,
               trial_pct: tpct };
    }
    if (ps === '回測中') {
      return { action:'觀察', reason:'OBSERVE', l4_code:'OBSERVE',
               detail:'回測仍在進行，等待回測完成再進場', posState };
    }
    return { action:'觀察', reason:'OBSERVE', l4_code:'OBSERVE',
             detail:'條件未完全符合，觀察等待', posState };
  }

  // Has position
  if (mo === '動能衰退') {
    return { action:'減碼', reason:'REDUCE_WEAK', l4_code:'REDUCE_WEAK',
             detail:'H3：動能衰退，先行減碼 20%', posState };
  }

  if (posState === '試單中' && sc >= P.add_min) {
    // check if B mode restricts
    const addPct = mode === 'B' ? 10 : P.add_pct;
    // risk_gating: block add if risk >= 50
    if (sr >= 50) {
      return { action:'續抱', reason:'HOLD', l4_code:'HOLD',
               detail:`score_risk=${sr}≥50，禁止加碼，降為續抱`, posState };
    }
    return { action:'加碼', reason:'ENTRY_ADD', l4_code:'ENTRY_ADD',
             detail:`P2：突破確認，score=${sc}≥${P.add_min}，加碼 ${addPct}%`, posState,
             add_pct: addPct };
  }

  return { action:'續抱', reason:'HOLD', l4_code:'HOLD',
           detail:'H1：結構未壞，動能正常，續抱', posState };
}

// ══════════════════════════════════════════════════════════════════
//  LAYER 5: RISK CONTROL ENGINE
// ══════════════════════════════════════════════════════════════════
function riskControl(proposed, d, P, scores) {
  const triggered = [];
  const pos = d.position_pct ?? 0;
  const hasPos = pos > 0;
  const profit_pct = d.profit_pct ?? 0;
  const rsi5 = d.rsi_5 ?? 0;
  const daily = d.daily_change_pct ?? 0;
  const vol_ratio = d.volume_ratio ?? 0;
  const is_planned = VS('is_planned') !== 'false';

  // R8: 非計畫內
  if (!is_planned) triggered.push({ rule:'R8', type:'no_entry', action:'不進場', detail:'非計畫內交易，禁止下單' });

  // R5: single stock limit
  if (hasPos && pos >= P.max_single) {
    triggered.push({ rule:'R5', type:'block_add', action:'續抱', detail:`持股${pos}%達上限${P.max_single}%` });
  }

  // R6: 攤平禁止
  if (hasPos && profit_pct < 0 && (proposed.action === '試單' || proposed.action === '加碼')) {
    triggered.push({ rule:'R6', type:'block_add', action:'不進場', detail:'虧損中禁止加碼攤平' });
  }

  if (hasPos) {
    // R4: structure (already handled in L4 as EXIT_STRUCT/EXIT_TREND, L5 confirms)
    if (proposed.l4_code === 'EXIT_STRUCT' || proposed.l4_code === 'EXIT_TREND') {
      // R4b/c/d — confirm
      if (proposed.l4_code === 'EXIT_TREND') {
        triggered.push({ rule:'R4d', type:'clear', action:'出場', detail:'下跌段確認，R4d 全清' });
      } else {
        // check if bar_close <= stop
        const sl_price = d.sl1 ? d.sl1 * (1 + P.sl_offset / 100) : null;
        if (sl_price && d.bar_close && d.bar_close <= sl_price) {
          triggered.push({ rule:'R4c', type:'clear', action:'出場', detail:`跌破停損價${sl_price?.toFixed(1)}，R4c 全清` });
        } else {
          triggered.push({ rule:'R4b', type:'reduce50', action:'減碼', detail:'結構破壞，R4b 強制減碼50%', pct:-50 });
        }
      }
    }

    // R4a: trailing stop
    if (d.price_high_recent && d.price_current) {
      const drawdown = (d.price_current - d.price_high_recent) / d.price_high_recent * 100;
      if (drawdown <= -P.r4_drawdown) {
        triggered.push({ rule:'R4a', type:'reduce30', action:'減碼', detail:`追蹤停損：自高點回落${Math.abs(drawdown).toFixed(1)}%≥${P.r4_drawdown}%，減碼30%`, pct:-30 });
      }
    }

    // R1
    if (profit_pct >= P.r1_profit) {
      triggered.push({ rule:'R1', type:'reduce50', action:'減碼', detail:`獲利${profit_pct.toFixed(1)}%≥${P.r1_profit}%，鎖利賣出50%`, pct:-50 });
    }
    // R2
    if (rsi5 >= P.r2_rsi) {
      triggered.push({ rule:'R2', type:'reduce50', action:'減碼', detail:`RSI(5)=${rsi5.toFixed(1)}≥${P.r2_rsi}，RSI過熱賣出50%`, pct:-50 });
    }
    // R3
    if (daily >= P.r3_gain && vol_ratio >= P.r3_vol) {
      triggered.push({ rule:'R3', type:'reduce33', action:'減碼', detail:`單日+${daily.toFixed(1)}%且量比${vol_ratio.toFixed(1)}x，爆量保命賣33%`, pct:-33 });
    }
  }

  if (triggered.length === 0) {
    return { final_action: proposed.action, override: false, rules: [] };
  }

  // Apply Fix-5 Conflict Resolution:
  // Priority: clear > reduce (take max) > block_add > no_entry
  const clears  = triggered.filter(r => r.type === 'clear');
  const reduces = triggered.filter(r => r.type === 'reduce50' || r.type === 'reduce30' || r.type === 'reduce33');
  const blocks  = triggered.filter(r => r.type === 'block_add');
  const noentry = triggered.filter(r => r.type === 'no_entry');

  let final_action = proposed.action;
  let override_rule = null;
  let override_detail = null;

  if (clears.length > 0) {
    final_action = '出場';
    override_rule = clears[0].rule;
    override_detail = clears[0].detail;
  } else if (reduces.length > 0) {
    // Take max reduction
    const maxReduce = reduces.reduce((max, r) => Math.abs(r.pct) > Math.abs(max.pct) ? r : max, reduces[0]);
    final_action = '減碼';
    override_rule = maxReduce.rule;
    override_detail = maxReduce.detail;
  } else if (noentry.length > 0 && !hasPos) {
    final_action = '不進場';
    override_rule = noentry[0].rule;
    override_detail = noentry[0].detail;
  } else if (blocks.length > 0) {
    if (proposed.action === '加碼') {
      final_action = '續抱';
      override_rule = blocks[0].rule;
      override_detail = blocks[0].detail;
    }
  }

  const didOverride = final_action !== proposed.action;
  return { final_action, override: didOverride, override_rule, override_detail, rules: triggered };
}

// ══════════════════════════════════════════════════════════════════
//  COMPUTE PROFIT PCT
// ══════════════════════════════════════════════════════════════════
function computeProfitPct(d) {
  if (d.cost_basis && d.price_current && d.cost_basis > 0) {
    return (d.price_current - d.cost_basis) / d.cost_basis * 100;
  }
  const el = document.getElementById('profit_pct');
  return el ? parseFloat(el.value) || 0 : 0;
}

// ══════════════════════════════════════════════════════════════════
//  STOP LOSS SUGGESTION
// ══════════════════════════════════════════════════════════════════
function suggestStopLoss(d, tags, P) {
  if (!d.sl1) return { mode:'—', price:'—', desc:'需填入 SL1' };
  const ps = tags.price_structure;
  if (ps === '結構破壞' || ps === '下跌段') {
    return { mode:'immediate', price:'立即', desc:'stop_loss_mode: immediate' };
  }
  const sl_price = d.sl1 * (1 + P.sl_offset / 100);
  return {
    mode:'structure',
    price: sl_price.toFixed(2),
    desc: `SL1 (${d.sl1}) × (1 ${P.sl_offset}%) = ${sl_price.toFixed(2)}`
  };
}

// ══════════════════════════════════════════════════════════════════
//  MAIN ANALYSIS
// ══════════════════════════════════════════════════════════════════
function runAnalysis() {
  const P = TEMPLATES[currentTemplate];
  const d = {
    price_current: V('price_current'), price_high_recent: V('price_high_recent'),
    price_low_recent: V('price_low_recent'), cost_basis: V('cost_basis'),
    bar_close: V('bar_close'), prev_close: V('prev_close'), today_open: V('today_open'),
    ma5: V('ma5'), ma10: V('ma10'), ma20: V('ma20'),
    rsi_5: V('rsi_5'), rsi_10: V('rsi_10'), rsi_5_prev: V('rsi_5_prev'),
    dif: V('dif'), signal: V('signal_macd'), osc: V('osc'), osc_prev: V('osc_prev'),
    sh1: V('sh1'), sh2: V('sh2'), sl1: V('sl1'), sl2: V('sl2'), swing_h3: V('swing_h3'),
    volume_now: V('volume_now'), volume_prev: V('volume_prev'),
    daily_change_pct: V('daily_change_pct'),
    chip_d0: V('chip_d0'), chip_d1: V('chip_d1'), chip_d2: V('chip_d2'),
    chip_d3: V('chip_d3'), chip_d4: V('chip_d4'),
    position_pct: V('position_pct') ?? 0,
  };
  d.profit_pct = computeProfitPct(d);

  // If no bar_close, fallback to price_current
  if (d.bar_close === null && d.price_current !== null) {
    d.bar_close = d.price_current;
  }

  const mode = currentMode;
  const tags = genTags(d, P);
  const scores = computeScores(tags, P);
  const proposed = tradeRule(tags, scores, d, P, mode);
  const risk = riskControl(proposed, d, P, scores);
  const sl = suggestStopLoss(d, tags, P);

  renderOutput(tags, scores, proposed, risk, sl, d, P, mode);
  saveState();
}

// ══════════════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════════════
function renderOutput(tags, scores, proposed, risk, sl, d, P, mode) {
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('result-wrap').style.display = 'block';

  // ── Decision box ──
  const fa = risk.final_action;
  const box = document.getElementById('decision-box');
  const act = document.getElementById('decision-action');
  const meta = document.getElementById('decision-meta');
  const ob   = document.getElementById('override-banner');

  box.className = `decision-box decided box-${fa}`;
  act.className = `decision-action action-${fa}`;
  act.textContent = fa;

  const symbol = VS('symbol') || '—';
  const tmplName = {A:'短線',B:'波段',C:'趨勢'}[currentTemplate];
  meta.innerHTML = `
    <span>${symbol}</span> &nbsp;|&nbsp;
    模式 <span>${mode || '未定'}</span> &nbsp;|&nbsp;
    模板 <span>${currentTemplate} ${tmplName}</span><br>
    綜合分 <span>${scores.score_composite}</span> &nbsp;/&nbsp;
    風險分 <span>${scores.score_risk}</span> &nbsp;|&nbsp;
    L4: <span>${proposed.l4_code}</span>
  `;

  if (risk.override) {
    ob.className = 'override-banner show';
    ob.innerHTML = `⚠ 風控覆蓋 [${risk.override_rule}]：${risk.override_detail}`;
  } else {
    ob.className = 'override-banner';
  }

  // ── Risk row ──
  const riskRow = document.getElementById('risk-row');
  const allRules = ['R1','R2','R3','R4a','R4b','R4c','R4d','R5','R6','R8'];
  const triggeredRules = new Set(risk.rules.map(r => r.rule));
  riskRow.innerHTML = allRules.map(r => {
    const on = triggeredRules.has(r);
    return `<div class="risk-item${on?' triggered':''}">
      <div class="risk-dot${on?' on-r':''}"></div>
      <span class="risk-label">${r}</span>
    </div>`;
  }).join('');

  // ── Composite bar ──
  const sc = scores.score_composite;
  const barFill = document.getElementById('composite-bar');
  const barVal  = document.getElementById('composite-val');
  const barZone = document.getElementById('composite-zone');
  barFill.style.width = sc + '%';
  barVal.textContent = sc;
  let barColor, zone;
  if (sc < 60)       { barColor='var(--red)';    zone='不達門檻'; }
  else if (sc < 70)  { barColor='var(--yellow2)'; zone='低強度進場區'; }
  else if (sc < 80)  { barColor='var(--yellow)';  zone='中等確信區'; }
  else if (sc < 90)  { barColor='var(--green)';   zone='高確信區'; }
  else               { barColor='var(--teal)';    zone='極高確信區'; }
  barFill.style.background = barColor;
  barZone.textContent = zone;
  barZone.style.color = barColor;

  // Score breakdown
  const bdWrap = document.getElementById('score-breakdown');
  const bdItems = [
    { label:'趨勢', val: scores.score_trend, color:'#58a6ff' },
    { label:'動能', val: scores.score_momentum, color:'#bc8cff' },
    { label:'籌碼', val: scores.score_chip, color:'#39d353' },
    { label:'風險', val: scores.score_risk, reverse: true, color:'#f85149' },
  ];
  bdWrap.innerHTML = bdItems.map(item => {
    const pct = item.reverse ? (100 - item.val) : item.val;
    return `<div class="breakdown-item">
      <span class="bd-label">${item.label}</span>
      <div class="bd-bar-track"><div class="bd-bar-fill" style="width:${item.val}%;background:${item.color}"></div></div>
      <span class="bd-val" style="color:${item.color}">${item.val}</span>
    </div>`;
  }).join('');

  // ── 4 scores ──
  const scRow = document.getElementById('scores-row');
  const sColors = { score_trend:'#58a6ff', score_momentum:'#bc8cff', score_chip:'#39d353', score_risk:'#f85149' };
  const sLabels = { score_trend:'趨勢', score_momentum:'動能', score_chip:'籌碼', score_risk:'風險' };
  scRow.innerHTML = Object.entries(sColors).map(([k, col]) => {
    const v = scores[k];
    return `<div class="score-card filled" style="--score-color:${col}">
      <div class="score-label">${sLabels[k]}</div>
      <div class="score-value">${v}</div>
      <div class="score-sub">${k==='score_risk'?'越高越危險':'/100'}</div>
    </div>`;
  }).join('');

  // ── Tags grid ──
  const tagClass = (tag, val) => {
    const bullTags = ['主升段','回測完成','動能加速','籌碼偏多','籌碼短多','多頭排列','放量突破','強勢區'];
    const bearTags = ['下跌段','結構破壞','翻空','籌碼偏空','籌碼短空','空頭排列','超買','爆量過熱'];
    const warnTags = ['回測中','動能衰退','整理末段','縮量整理','超賣','弱勢區'];
    if (bullTags.includes(val)) return 'tag-bull';
    if (bearTags.includes(val)) return 'tag-bear';
    if (warnTags.includes(val)) return 'tag-warn';
    return 'tag-neutral';
  };
  const tagDefs = [
    { key:'price_structure', label:'價格結構' },
    { key:'ma_alignment',    label:'均線排列' },
    { key:'momentum',        label:'動能狀態' },
    { key:'chip',            label:'籌碼方向' },
    { key:'volume',          label:'量能狀態' },
    { key:'rsi_zone',        label:'RSI 區間' },
  ];
  const tGrid = document.getElementById('tags-grid');
  tGrid.innerHTML = tagDefs.map(t => {
    const val = tags[t.key] || '—';
    return `<div class="tag-card active ${tagClass(t.key, val)}">
      <div class="tag-label">${t.label}</div>
      <div class="tag-value">${val}</div>
    </div>`;
  }).join('');

  // ── Suggestion grid ──
  const sGrid = document.getElementById('suggestion-grid');
  const posState = proposed.posState || '—';
  const trialPct = proposed.trial_pct ?? P.trial_pct;
  const addPct   = proposed.add_pct   ?? P.add_pct;
  let posDesc = '—';
  if (fa === '試單')  posDesc = `+${trialPct}%`;
  else if (fa === '加碼')  posDesc = `+${addPct}%`;
  else if (fa === '減碼')  {
    const red = risk.rules.find(r => r.pct);
    posDesc = red ? `${red.pct}%` : '-20%';
  }
  else if (fa === '出場')  posDesc = '清倉';
  else if (fa === '續抱' || fa === '觀察') posDesc = '不變';
  else posDesc = '0%';

  sGrid.innerHTML = `
    <div class="sugg-card">
      <div class="sugg-label">建議停損</div>
      <div class="sugg-value">${sl.price}</div>
      <div class="sugg-sub">${sl.desc}</div>
    </div>
    <div class="sugg-card">
      <div class="sugg-label">建議部位變動</div>
      <div class="sugg-value">${posDesc}</div>
      <div class="sugg-sub">當前狀態：${posState}</div>
    </div>
    <div class="sugg-card">
      <div class="sugg-label">進場門檻</div>
      <div class="sugg-value">${P.entry_min}</div>
      <div class="sugg-sub">加碼門檻：${P.add_min}</div>
    </div>
    <div class="sugg-card">
      <div class="sugg-label">獲利 / 損益</div>
      <div class="sugg-value" style="color:${d.profit_pct>=0?'var(--green)':'var(--red)'}">${d.profit_pct.toFixed(1)}%</div>
      <div class="sugg-sub">R1 鎖利線：${P.r1_profit}%</div>
    </div>
  `;

  // ── L4 reason ──
  document.getElementById('reason-code').textContent = proposed.l4_code || '—';
  document.getElementById('reason-text').textContent = proposed.detail || '—';
}

// ══════════════════════════════════════════════════════════════════
//  PERSIST (localStorage)
// ══════════════════════════════════════════════════════════════════
const INPUT_IDS = [
  'symbol','price_current','price_high_recent','price_low_recent','cost_basis',
  'bar_close','prev_close','today_open','timeframe',
  'ma5','ma10','ma20','rsi_5','rsi_10','rsi_5_prev',
  'dif','signal_macd','osc','osc_prev',
  'sh1','sh2','sl1','sl2','swing_h3',
  'volume_now','volume_prev','daily_change_pct',
  'chip_d0','chip_d1','chip_d2','chip_d3','chip_d4',
  'position_pct','profit_pct','is_planned'
];

function saveState() {
  const state = { mode: currentMode, template: currentTemplate };
  INPUT_IDS.forEach(id => {
    const el = document.getElementById(id);
    if (el) state[id] = el.value;
  });
  try { localStorage.setItem('trading_state', JSON.stringify(state)); } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem('trading_state');
    if (!raw) return;
    const state = JSON.parse(raw);
    if (state.mode !== undefined) setMode(state.mode);
    if (state.template) setTemplate(state.template);
    INPUT_IDS.forEach(id => {
      const el = document.getElementById(id);
      if (el && state[id] !== undefined) el.value = state[id];
    });
  } catch(e) {}
}

// Auto-save on any input change
document.addEventListener('input', () => saveState());
document.addEventListener('change', () => saveState());

// Init
loadState();
// If state was loaded, auto-run analysis
if (localStorage.getItem('trading_state')) {
  try { runAnalysis(); } catch(e) {}
}
</script>
