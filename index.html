<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0a0c0f">
<title>交易分析系統 v1.2</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background-color: #0a0c0f; color-scheme: dark; }
body {
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  background-color: #0a0c0f;
  color: #f0f4f8;
  font-size: 14px;
  min-height: 100vh;
}
@media (prefers-color-scheme: light) {
  html, body { background-color: #0a0c0f !important; color: #f0f4f8 !important; }
}
.header {
  background-color: #111418;
  border-bottom: 2px solid #3a4150;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-title { font-size: 16px; font-weight: 700; color: #f0f4f8; }
.header-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 700; }
.badge-version { background-color: #252b34; color: #b8c4d0; border: 1px solid #3a4150; }
.badge-offline { background-color: #003300; color: #00e676; border: 1px solid #00c853; }
.mode-selector { margin-left: auto; display: flex; gap: 6px; }
.mode-btn {
  padding: 6px 14px; border-radius: 8px; border: 2px solid #3a4150;
  background-color: #1a1f26; color: #b8c4d0; cursor: pointer;
  font-size: 13px; font-weight: 600; font-family: inherit;
  min-width: 60px; text-align: center; -webkit-appearance: none; appearance: none;
}
.mode-btn.active-a { background-color: #003366; border-color: #4da6ff; color: #fff; font-weight: 800; }
.mode-btn.active-b { background-color: #1a3300; border-color: #00e676; color: #00e676; font-weight: 800; }
.mode-btn.active-none { background-color: #252b34; border-color: #3a4150; color: #6e7e90; }
.layout {
  display: grid;
  grid-template-columns: 400px 1fr;
  height: calc(100vh - 52px);
}
.input-panel { background-color: #111418; border-right: 2px solid #3a4150; overflow-y: auto; }
.input-panel::-webkit-scrollbar { width: 3px; }
.input-panel::-webkit-scrollbar-thumb { background-color: #3a4150; }
.output-panel { background-color: #0a0c0f; overflow-y: auto; }
.output-panel::-webkit-scrollbar { width: 3px; }
.output-panel::-webkit-scrollbar-thumb { background-color: #3a4150; }
.section-hdr {
  padding: 10px 14px; background-color: #1a1f26;
  border-bottom: 1px solid #3a4150; border-top: 1px solid #252b34;
  font-size: 11px; font-weight: 700; color: #b8c4d0;
  letter-spacing: 1px; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.section-hdr .dot { width: 7px; height: 7px; border-radius: 50%; background-color: #4da6ff; flex-shrink: 0; }
.section-hdr .dot-green  { background-color: #00e676; }
.section-hdr .dot-yellow { background-color: #ffca28; }
.section-hdr .dot-red    { background-color: #ff5252; }
.section-hdr .dot-purple { background-color: #ce93d8; }
.section-hdr .opt-label { margin-left: auto; font-size: 10px; color: #ffca28; text-transform: none; font-weight: 600; }
.template-row {
  display: flex; gap: 6px; padding: 10px 14px;
  border-bottom: 1px solid #3a4150; background-color: #111418;
}
.tmpl-btn {
  flex: 1; padding: 8px 4px; border-radius: 6px; border: 2px solid #3a4150;
  background-color: #1a1f26; color: #b8c4d0; cursor: pointer;
  font-size: 12px; font-weight: 600; font-family: inherit; text-align: center;
  -webkit-appearance: none; appearance: none;
}
.tmpl-btn.active { background-color: #001a33; border-color: #4da6ff; color: #4da6ff; font-weight: 800; }
.input-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
  background-color: #3a4150; border-bottom: 1px solid #3a4150;
}
.input-grid.cols3 { grid-template-columns: 1fr 1fr 1fr; }
.input-grid.cols4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.input-grid.cols1 { grid-template-columns: 1fr; }
.input-cell { background-color: #111418; padding: 10px 12px; display: flex; flex-direction: column; gap: 4px; }
.input-cell label { font-size: 11px; font-weight: 600; color: #6e7e90; letter-spacing: .4px; text-transform: uppercase; }
.input-cell input, .input-cell select {
  background-color: #1a1f26; border: 1px solid #3a4150; border-radius: 5px;
  color: #f0f4f8; font-family: inherit; font-size: 15px; font-weight: 600;
  padding: 5px 8px; outline: none; width: 100%; -webkit-appearance: none; appearance: none;
}
.input-cell input:focus, .input-cell select:focus { border-color: #4da6ff; background-color: #0d1a2e; }
.input-cell input::placeholder { color: #6e7e90; font-size: 13px; font-weight: 400; }
.input-cell select option { background-color: #1a1f26; color: #f0f4f8; }
.input-cell .unit { font-size: 10px; color: #6e7e90; margin-top: 1px; }
.chip-row { display: flex; gap: 1px; background-color: #3a4150; border-bottom: 1px solid #3a4150; }
.chip-cell { flex: 1; background-color: #111418; padding: 8px; }
.chip-cell label { font-size: 10px; font-weight: 600; color: #6e7e90; text-transform: uppercase; display: block; margin-bottom: 3px; }
.chip-cell input {
  width: 100%; background-color: #1a1f26; border: 1px solid #3a4150; border-radius: 4px;
  color: #f0f4f8; font-family: inherit; font-size: 14px; font-weight: 600;
  padding: 4px 6px; outline: none; -webkit-appearance: none;
}
.chip-cell input:focus { border-color: #4da6ff; }
.analyse-wrap { padding: 14px; border-bottom: 1px solid #3a4150; background-color: #111418; }
.btn-analyse {
  width: 100%; padding: 14px; background-color: #1a56a0; color: #fff;
  border: 2px solid #4da6ff; border-radius: 8px; font-family: inherit;
  font-size: 16px; font-weight: 800; cursor: pointer; display: block;
  -webkit-appearance: none; appearance: none;
}
.btn-analyse:active { opacity: .8; }
.out-section { border-bottom: 2px solid #3a4150; }
.decision-wrap { padding: 12px; }
.decision-box {
  background-color: #111418; border: 3px solid #3a4150; border-radius: 8px;
  padding: 18px 16px; text-align: center;
}
.decision-action { font-size: 36px; font-weight: 900; letter-spacing: 2px; margin-bottom: 8px; color: #6e7e90; }
.decision-meta { font-size: 12px; color: #6e7e90; line-height: 1.7; }
.decision-meta span { color: #b8c4d0; font-weight: 600; }
.override-banner {
  margin-top: 10px; padding: 8px 12px; background-color: #1a0f00;
  border: 2px solid #ffca28; border-radius: 6px;
  font-size: 12px; font-weight: 600; color: #ffca28; text-align: left; display: none;
}
.override-banner.show { display: block; }
.action-not-enter { color: #6e7e90 !important; }
.action-watch     { color: #ffca28 !important; }
.action-trial     { color: #00e676 !important; }
.action-add       { color: #00e5ff !important; }
.action-hold      { color: #4da6ff !important; }
.action-reduce    { color: #ffa726 !important; }
.action-exit      { color: #ff5252 !important; }
.box-not-enter { border-color: #3a4150 !important; background-color: #111418 !important; }
.box-watch     { border-color: #ffca28 !important; background-color: #1a1000 !important; }
.box-trial     { border-color: #00c853 !important; background-color: #001a00 !important; }
.box-add       { border-color: #00e676 !important; background-color: #002200 !important; }
.box-hold      { border-color: #4da6ff !important; background-color: #001133 !important; }
.box-reduce    { border-color: #ffa726 !important; background-color: #1a0f00 !important; }
.box-exit      { border-color: #ff5252 !important; background-color: #1a0000 !important; }
.risk-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 10px 12px; }
.risk-item {
  background-color: #1a1f26; border: 2px solid #3a4150; border-radius: 6px;
  padding: 6px 8px; display: flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600;
}
.risk-dot { width: 9px; height: 9px; border-radius: 50%; background-color: #3a4150; flex-shrink: 0; }
.risk-dot.on-r { background-color: #ff5252; box-shadow: 0 0 8px #ff5252; }
.risk-label { color: #6e7e90; }
.risk-item.triggered { border-color: #ff5252; background-color: #1a0000; }
.risk-item.triggered .risk-label { color: #ff5252; font-weight: 800; }
.tags-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px; }
.tag-card { background-color: #1a1f26; border: 2px solid #3a4150; border-radius: 8px; padding: 10px 10px 8px; }
.tag-card .tag-label { font-size: 10px; font-weight: 700; color: #6e7e90; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; }
.tag-card .tag-value { font-size: 13px; font-weight: 700; color: #b8c4d0; }
.tag-card.tag-bull { border-color: #00c853; background-color: #001a00; }
.tag-card.tag-bull .tag-value { color: #00e676; }
.tag-card.tag-bear { border-color: #8b0000; background-color: #1a0000; }
.tag-card.tag-bear .tag-value { color: #ff5252; }
.tag-card.tag-warn { border-color: #7a5000; background-color: #1a1000; }
.tag-card.tag-warn .tag-value { color: #ffca28; }
.tag-card.tag-neutral { border-color: #3a4150; background-color: #1a1f26; }
.tag-card.tag-neutral .tag-value { color: #b8c4d0; }
.scores-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 12px; }
.score-card {
  background-color: #111418; border: 2px solid #3a4150; border-radius: 8px;
  padding: 10px 8px; text-align: center; position: relative; overflow: hidden;
}
.score-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background-color: #3a4150; }
.score-card.filled::after { background-color: var(--score-color, #4da6ff); }
.score-label { font-size: 10px; font-weight: 700; color: #6e7e90; text-transform: uppercase; letter-spacing: .5px; }
.score-value { font-size: 26px; font-weight: 800; margin: 4px 0 2px; color: #b8c4d0; }
.score-card.filled .score-value { color: var(--score-color, #4da6ff); }
.score-sub { font-size: 9px; color: #6e7e90; }
.composite-bar-wrap { padding: 10px 12px; }
.composite-bar-label { display: flex; justify-content: space-between; margin-bottom: 7px; font-size: 13px; font-weight: 600; color: #b8c4d0; }
